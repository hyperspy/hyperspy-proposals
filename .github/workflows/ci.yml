name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PIXI_VERSION: v0.66.0

jobs:
  checks:
    name: Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: ${{ env.PIXI_VERSION }}
      - name: Frontmatter validation
        run: pixi run frontmatter
      - name: Markdown lint
        run: pixi run lint
      - name: Link check
        run: pixi run links
      - name: Upload pixi.lock artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pixi-lock
          path: pixi.lock

  ai-trailers:
    name: AI Trailer Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python scripts/ci-check-ai-trailers.py ${{ github.event.pull_request.base.sha || github.event.before }} ${{ github.sha }}