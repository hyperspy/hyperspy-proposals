default_install_hook_types:
  - pre-commit
  - commit-msg
ci:
  autofix_prs: true
  autoupdate_schedule: monthly
  skip: [validate-frontmatter, check-ai-co-author]
repos:
  - repo: https://github.com/rvben/rumdl-pre-commit
    rev: v0.2.28
    hooks:
      - id: rumdl
        args: ["--fix"]
  - repo: local
    hooks:
      - id: validate-frontmatter
        name: Validate proposal frontmatter
        entry: python .github/scripts/validate-frontmatter.py
        language: system
        files: '^proposals/[0-9]{4}-.*\.md$'
        pass_filenames: false
      - id: check-ai-co-author
        name: Block Co-authored-by AI trailers
        entry: scripts/check-ai-co-author.py
        language: script
        stages: [commit-msg]
        always_run: true
